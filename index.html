<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GYM TYME</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav>
      <div class="flex">
        <img src="/assets/logo.png" alt="logo" />
        <h3>Gym Tyme</h3>
      </div>
    </nav>

    <main>
      <section class="hero">
        <div class="one">
          <h4>Premium Gym Equipment</h4>
          <p>No Hassle, Free Delivery</p>
          <img src="/assets/gym.png"/>
        </div>
        <div class="two">
          <form>
            <input type="text" name="username" placeholder="Enter your name" /><br />
            <input type="email" name="email" placeholder="Enter your email" /><br />
            <div class="gender">
              <input type="radio" value="Male" name="gender" /><label for="Male"
                >Male</label
              >
              <input type="radio" value="Female" name="gender" /><label
                for="Female"
                >Female</label
              >
            </div>
            <div class="checkboxes">
              <div class="item">
                <input type="checkbox" value="Weights" name="equipment" /><label
                  for="Weights"
                  >Weights</label
                >
              </div>
              <div class="item">
                <input
                  type="checkbox"
                  value="Dumbbells"
                  name="equipment"
                /><label for="Dumbbells">Dumbbells</label>
              </div>
              <div class="item">
                <input type="checkbox" value="Ropes" name="equipment" /><label
                  for="Ropes"
                  >Ropes</label
                >
              </div>
              <div class="item">
                <input type="checkbox" value="Shirts" name="equipment" /><label
                  for="Shirts"
                  >Shirts</label
                >
              </div>
            </div>
            <input type="submit" value="Book Your Equipment" class="button" />
          </form>
        </div>
      </section>

      <section class="equipment_list">
        <h3>Get Your latest equipment</h3>

        <div class="cards">
          <div class="card"><img src="/assets/dumbbell.png" /></div>
          <div class="card"><img src="/assets/sdumbbell.png" /></div>
          <div class="card"><img src="/assets/kettle.png" /></div>
          <div class="card"><img src="/assets/plates.png" /></div>
        </div>
      </section>

      <section class="segments">
        <div class="segmentA">
          <h3>Equipment</h3>
          <img src="/assets/bag.png" alt="bag" />
        </div>
        <div class="segmentB">
          <h3>MemberShip</h3>
          <img src="/assets/membership.png" />
        </div>
      </section>
    </main>
  </body>
</html>
